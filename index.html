<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app-shell">
    <div class="glass-card">
        <header class="hero">
            <h1>🌤 Weather App</h1>
            <div id="liveClock" class="live-clock" aria-live="polite">Loading current time...</div>
            <p>Check live weather for any city with a clean, modern interface.</p>
        </header>

        <div class="search-panel">
            <div class="search-box">
                <input
                    type="text"
                    id="cityInput"
                    placeholder="Enter city name"
                    autocomplete="off">
                <button id="searchBtn">Search</button>
            </div>
        </div>

        <div id="loader" class="loader hidden" aria-live="polite" aria-busy="true">
            <div class="spinner"></div>
            <span>Fetching weather...</span>
        </div>

        <section id="weatherResult" class="weather-card fade-in">
            <h2>Search a city</h2>
            <p>Type a location and tap Search to view current weather conditions.</p>
        </section>

        <section id="favoriteCities" class="favorite-searches" aria-live="polite">
            <div class="recent-searches-header">
                <h3>Favorite Cities</h3>
            </div>
            <ul id="favoriteCitiesList" class="recent-searches-list"></ul>
        </section>

        <section id="compareCities" class="compare-section" aria-live="polite">
            <div class="recent-searches-header">
                <h3>Compare Cities</h3>
            </div>
            <div class="compare-inputs">
                <input type="text" id="compareCityOne" placeholder="Enter city 1" autocomplete="off">
                <input type="text" id="compareCityTwo" placeholder="Enter city 2" autocomplete="off">
                <button id="compareBtn" type="button">Compare</button>
            </div>
            <div id="compareResults" class="compare-results"></div>
        </section>

        <section id="recentSearches" class="recent-searches" aria-live="polite">
            <div class="recent-searches-header">
                <h3>Recent Searches</h3>
                <button id="clearHistoryBtn" class="clear-history-btn" type="button">Clear History</button>
            </div>
            <ul id="recentSearchesList" class="recent-searches-list"></ul>
        </section>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
